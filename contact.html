<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Contact | My Cloud Website</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <nav>
    <a href="index.html" class="nav-logo">☁ CLOUDSITE</a>
    <ul class="nav-links">
      <li><a href="index.html">Home</a></li>
      <li><a href="about.html">About</a></li>
      <li><a href="contact.html" class="active">Contact</a></li>
    </ul>
  </nav>

  <main>
    <h1 class="page-title">Get In Touch</h1>
    <p class="page-sub">This is the contact page for the Cloud Computing lab project. Feel free to reach out with any questions.</p>

    <div class="contact-form">
      <div class="form-group">
        <label for="name">Your Name</label>
        <input type="text" id="name" placeholder="Enter your name" />
      </div>
      <div class="form-group">
        <label for="email">Email Address</label>
        <input type="email" id="email" placeholder="student@email.com" />
      </div>
      <div class="form-group">
        <label for="message">Message</label>
        <textarea id="message" placeholder="Write your message here..."></textarea>
      </div>
      <button class="btn">Send Message</button>
    </div>

    <div class="contact-info">
      <span style="color:var(--muted); font-size:0.85rem;">Or reach me directly:</span>
      <a href="mailto:student@email.com">📧 student@email.com</a>
    </div>
  </main>

  <footer>
    &copy; 2025 My Cloud Website &mdash; Cloud Computing Lab Task 2
  </footer>

</body>
</html>
